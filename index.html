.contact-layout {

}

.contact-layout.hidden {

.contact-header {

}

.contact-scroll-area {

}

.contact-cards {

}

.contact-car {

}

.contact-car:nth-child(2n) {
  border-color: #bbf7d0;
}

.contact-car:nth-child(3n) {
  border-color: #fed7aa;
}

.contact-car:nth-child(4n) {

}

    <div id="inactive-cars" class="cars-area"></div>
  </section>

</div>

<div class="bottom-menu-area">
      <div class="menu-area">
      <details>
  　　<summary>🚗 車管理</summary>
      <div class="car-form">
        <input type="text" id="carNameInput" placeholder="追加車名">

        <input type="number" id="capacityInput" placeholder="定員">

        <button onclick="addCar()">車追加</button>

        <br><br>

        <input type="text" id="deleteCarInput" placeholder="削除する車名">

        <button onclick="deleteCar()">車削除</button>
      </div>

      </details>
       <details>
        <summary>👦 参加者</summary>
      <div class="people">
        

        <input type="text" id="nameInput" placeholder="名前を入力">

        <button onclick="addPerson()">追加</button>

        <br><br>

        <input type="text" id="deleteInput" placeholder="削除する名前">

        <button onclick="deletePerson()">削除</button>

        <br><br>

       
      </div>

</div>

</div>

  <script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwiL44FlJHSHGdn9tboQEsfH8pt2fLA0X3GxhHZIXFkrh1TRfZ_OY0pUlWdESiSCatT/exec';

let draggedItem = null;
let selectedPerson = null;
let latestData = [];
let latestChildren = [];
let latestSavedData = [];
let isActiveOnlyView = localStorage.getItem('dispatchActiveOnlyView') === 'true';

// 未配置ボックスも、車と同じくドラッグ・タップ移動の行き先として使う
setupDropzone(document.getElementById('people-area'));

loadEvents();

function getPartClass(part) {
  if (['トランペット', 'トロンボーン', 'ホルン', 'チューバ', 'ユーフォニアム'].includes(part)) {
    return 'brass';
  }

  if (['クラリネット', 'サックス', 'フルート'].includes(part)) {
    return 'woodwind';
  }

  return 'other';
}

function getSelectedRoute() {
  return document.getElementById('route-select').value;
}

function getSelectedEvent() {
  return document.getElementById('event-select').value;
}

function getCarName(car) {
  return car.dataset.carName || '';
}

function getViewStorageKey() {
  return `dispatch:${getSelectedEvent()}:${getSelectedRoute()}`;
}

function getCollapsedStorageKey(car) {
  return `${getViewStorageKey()}:collapsed:${getCarName(car)}`;
}

function saveCarCollapsedState(car) {
  localStorage.setItem(
    getCollapsedStorageKey(car),
    car.classList.contains('collapsed') ? 'true' : 'false'
  );
}

function applySavedCollapsedState(car) {
  const saved = localStorage.getItem(getCollapsedStorageKey(car));

  if (saved === 'true') {
    setCarCollapsed(car, true, false);
  } else {
    setCarCollapsed(car, false, false);
  }
}

function setCarCollapsed(car, shouldCollapse, shouldSave = true) {
  const icon = car.querySelector('.car-collapse-icon');

  car.classList.toggle('collapsed', shouldCollapse);

  if (icon) {
    icon.textContent = shouldCollapse ? '▶' : '▼';
  }

  if (shouldSave) {
    saveCarCollapsedState(car);
  }
}

function createPersonElement(item) {
  const person = document.createElement('div');
  person.className = 'person';
  person.classList.add(getPartClass(item.part));
  person.draggable = true;
  person.textContent = item.familyName;
  setupPerson(person);
  return person;
}

function createCarElement(item) {
  const capacity = parseInt(item.capacity, 10) || 0;
  const car = document.createElement('div');

  car.className = 'car disabled-car';
  car.dataset.capacity = capacity;
  car.dataset.carName = item.familyName;

  if (item.availability === '往復可能') {
    car.classList.add('round-trip');
  } else if (item.availability === '行きのみ可能') {
    car.classList.add('go-only');
  } else if (item.availability === '帰りのみ可能') {
    car.classList.add('back-only');
  }

  car.innerHTML = `
    <div class="car-header">
      <div class="car-title-row">
        <span class="car-collapse-icon">▼</span>
        <h2>
          🚗 ${item.familyName}<br>
          <span class="remaining-text">
            <span class="label">残</span><span class="count">${capacity}</span><span class="unit">席</span>
          </span>
        </h2>
      </div>
    </div>
    <div class="dropzone"></div>
  `;

  setupCarAccordion(car);
  setupDropzone(car.querySelector('.dropzone'));
  setupCarToggle(car);

  return car;
}

function setupCarAccordion(car) {
  const header = car.querySelector('.car-header');

  header.addEventListener('click', (e) => {
    if (e.target.closest('button')) return;

    setCarCollapsed(car, !car.classList.contains('collapsed'));
  });
}

function setCarActive(car, isActive) {
  const activeCarsArea = document.getElementById('active-cars');
  const inactiveCarsArea = document.getElementById('inactive-cars');

  if (isActive) {
    car.classList.remove('disabled-car');
    activeCarsArea.appendChild(car);
    autoPlaceParentChild(car);
  } else {
    returnAllChildrenToWaitingArea(car);
    car.classList.add('disabled-car');
    inactiveCarsArea.appendChild(car);
  }

  if (typeof car.updateToggleButtonText === 'function') {
    car.updateToggleButtonText();
  }
}

function normalizeFamilyName(value) {
  return String(value || '')
    .replace(/^🚗/, '')
    .replace(/車$/, '')
    .trim();
}

function autoPlaceParentChild(car) {
  const peopleArea = document.getElementById('people-area');
  const zone = car.querySelector('.dropzone');
  const carName = normalizeFamilyName(getCarName(car));

  if (!peopleArea || !zone || !carName) return;

  const alreadyInThisCar = [...zone.querySelectorAll('.person')].some(person =>
    normalizeFamilyName(person.textContent) === carName
  );

  if (alreadyInThisCar) return;

  const targetPerson = [...peopleArea.querySelectorAll('.person')].find(person =>
    normalizeFamilyName(person.textContent) === carName
  );

  if (!targetPerson) return;

  const capacity = Number(car.dataset.capacity) || 0;
  const peopleCount = zone.querySelectorAll('.person').length;

  if (capacity > 0 && peopleCount >= capacity) return;

  targetPerson.classList.remove('selected');
  zone.appendChild(targetPerson);

  if (selectedPerson === targetPerson) {
    selectedPerson = null;
  }
}

function returnAllChildrenToWaitingArea(car) {
  const peopleArea = document.getElementById('people-area');
  const zone = car.querySelector('.dropzone');

  if (!peopleArea || !zone) return;

  zone.querySelectorAll('.person').forEach(person => {
    person.classList.remove('selected');
    peopleArea.appendChild(person);

    if (selectedPerson === person) {
      selectedPerson = null;
    }
  });

  draggedItem = null;
}

function createCars(data, children, selectedEvent, savedData = []) {
  latestData = data || [];
  latestChildren = children || [];
  latestSavedData = savedData || [];

  const activeCarsArea = document.getElementById('active-cars');
  const inactiveCarsArea = document.getElementById('inactive-cars');
  const peopleArea = document.getElementById('people-area');
  const selectedRoute = getSelectedRoute();

  peopleArea.innerHTML = '';
  activeCarsArea.innerHTML = '';
  inactiveCarsArea.innerHTML = '';

  const uniqueMembers = [];
  const seenMembers = new Set();

  (children || []).forEach(child => {
    if (!child.familyName || seenMembers.has(child.familyName)) return;
    seenMembers.add(child.familyName);
    uniqueMembers.push({
      familyName: child.familyName,
      part: child.part
    });
  });

  uniqueMembers.forEach(item => {
    peopleArea.appendChild(createPersonElement(item));
  });

  const drivers = (data || []).filter(item =>
    item.event === selectedEvent &&
    item.route === selectedRoute &&
    item.availability &&
    item.availability.includes('可能')
  );

  drivers.sort((a, b) => {
    const scoreA = Number(a.historyCount) + (a.recentUsed ? 100 : 0);
    const scoreB = Number(b.historyCount) + (b.recentUsed ? 100 : 0);
    return scoreA - scoreB;
  });

  drivers.forEach(item => {
    if (item.familyName === '人') return;
    const car = createCarElement(item);
    inactiveCarsArea.appendChild(car);
    applySavedCollapsedState(car);
  });

  applyActiveOnlyView();
  updateCounts();
}

function restoreSavedData(savedData, selectedEvent, selectedRoute) {
  const targetSaved = (savedData || []).filter(item =>
    item.event === selectedEvent &&
    item.route === selectedRoute
  );

  targetSaved.forEach(savedCar => {
    const car = [...document.querySelectorAll('.car')].find(car =>
      getCarName(car) === savedCar.carName
    );

    if (!car) return;

    const zone = car.querySelector('.dropzone');

    (savedCar.members || []).forEach(memberName => {
      const person = [...document.querySelectorAll('#people-area .person')].find(person =>
        person.textContent.trim() === memberName
      );

      if (person) {
        zone.appendChild(person);
      }
    });

    if ((savedCar.members || []).length > 0) {
      setCarActive(car, true);
    }
  });

  updateCounts();
}

function markPairedRouteCars(savedData, selectedEvent, selectedRoute) {
  const oppositeRoute = selectedRoute === '行き' ? '帰り' : '行き';

  const oppositeSaved = (savedData || []).filter(item =>
    item.event === selectedEvent &&
    item.route === oppositeRoute
  );

  document.querySelectorAll('.car').forEach(car => {
    car.classList.remove('paired-route');

    const isPaired = oppositeSaved.some(savedCar =>
      savedCar.carName === getCarName(car)
    );

    if (isPaired) {
      car.classList.add('paired-route');
    }
  });
}

async function loadEvents() {
  const response = await fetch(GAS_URL);
  const responseData = await response.json();

  const data = responseData.candidates || [];
  const children = responseData.children || [];
  const savedData = responseData.saved || [];

  latestData = data;
  latestChildren = children;
  latestSavedData = savedData;

  const select = document.getElementById('event-select');

  const events = [...new Set(data.map(item => item.event))]
    .sort((a, b) => {
      const dateA = a.match(/\d+\/\d+/)?.[0];
      const dateB = b.match(/\d+\/\d+/)?.[0];
      return new Date(`2026/${dateA}`) - new Date(`2026/${dateB}`);
    });

  select.innerHTML = '';

  events.forEach(eventName => {
    const option = document.createElement('option');
    option.value = eventName;
    option.textContent = eventName;

    const matchedItem = data.find(item => item.event === eventName);
    option.dataset.date = matchedItem?.date || '';

    select.appendChild(option);
  });

  select.onchange = renderCurrentSelection;
  document.getElementById('route-select').onchange = renderCurrentSelection;

  renderCurrentSelection();
}

function renderCurrentSelection() {
  const selectedEvent = getSelectedEvent();
  const selectedRoute = getSelectedRoute();

  createCars(latestData, latestChildren, selectedEvent, latestSavedData);
  restoreSavedData(latestSavedData, selectedEvent, selectedRoute);
  markPairedRouteCars(latestSavedData, selectedEvent, selectedRoute);
  applyActiveOnlyView();
}

function setupPerson(person) {
  person.addEventListener('dragstart', () => {
    draggedItem = person;
  });

  function selectThisPerson(e) {
    e.preventDefault();
    e.stopPropagation();

    document.querySelectorAll('.person').forEach(p => {
      p.classList.remove('selected');
    });

    selectedPerson = person;
    person.classList.add('selected');

    const selectedName = document.getElementById('selected-name');
    if (selectedName) {
      selectedName.textContent = `選択中：${person.textContent}`;
    }
  }

  person.addEventListener('click', selectThisPerson);
  person.addEventListener('touchstart', selectThisPerson);
}

function setupDropzone(zone) {
  zone.addEventListener('dragover', (e) => {
    e.preventDefault();
  });

  zone.addEventListener('drop', () => {
    if (!draggedItem) return;

    if (!canMovePersonToZone(zone)) {
      draggedItem = null;
      return;
    }

    zone.appendChild(draggedItem);
    draggedItem = null;
    updateCounts();
  });

  zone.addEventListener('click', moveSelectedPerson);
  zone.addEventListener('touchstart', moveSelectedPerson);

  function moveSelectedPerson(e) {
    if (!selectedPerson) return;

    e.preventDefault();
    e.stopPropagation();

    if (!canMovePersonToZone(zone)) return;

    zone.appendChild(selectedPerson);
    selectedPerson.classList.remove('selected');
    selectedPerson = null;

    const selectedName = document.getElementById('selected-name');
    if (selectedName) {
      selectedName.textContent = '選択中：なし';
    }

    updateCounts();
  }
}

function canMovePersonToZone(zone) {
  const car = zone.closest('.car');

  if (car && car.classList.contains('disabled-car')) {
    alert('この車は使わない設定です');
    return false;
  }

  if (car) {
    const capacity = Number(car.dataset.capacity);
    const people = zone.querySelectorAll('.person').length;

    if (people >= capacity) {
      alert('この車は満席です！');
      return false;
    }
  }

  return true;
}

function setupCarToggle(car) {
  const button = document.createElement('button');
  button.className = 'car-toggle-button';

  car.updateToggleButtonText = function () {
    button.textContent = car.classList.contains('disabled-car')
      ? '🚗 使う'
      : '🚫 使わない';
  };

  button.addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();

    setCarActive(car, car.classList.contains('disabled-car'));
    updateCounts();
  });

  car.updateToggleButtonText();
  car.insertBefore(button, car.firstChild);
}

function updateCounts() {
  const cars = document.querySelectorAll('.car');
  const totalChildren = document.querySelectorAll('.person').length;

  let totalCapacity = 0;

  cars.forEach(car => {
    const capacity = Number(car.dataset.capacity);
    const people = car.querySelectorAll('.person').length;
    const remaining = capacity - people;
    const count = car.querySelector('.count');
    const label = car.querySelector('.label');
    const unit = car.querySelector('.unit');

    if (car.classList.contains('disabled-car')) {
      car.classList.remove('full');
      if (count) count.textContent = capacity;
      if (label) label.style.display = 'inline';
      if (unit) unit.style.display = 'inline';
      return;
    }

    totalCapacity += capacity;

    if (remaining <= 0) {
      count.textContent = '満席';
      label.style.display = 'none';
      unit.style.display = 'none';
      car.classList.add('full');
    } else {
      count.textContent = remaining;
      label.style.display = 'inline';
      unit.style.display = 'inline';
      car.classList.remove('full');
    }
  });

  const seatDiff = totalCapacity - totalChildren;
  const summary = document.getElementById('seat-summary');

  if (!summary) return;

  summary.classList.remove('seat-danger', 'seat-ok', 'seat-perfect');

  if (seatDiff > 0) {
    summary.textContent = `余裕：${seatDiff}席`;
    summary.classList.add('seat-ok');
  } else if (seatDiff === 0) {
    summary.textContent = '席数ぴったり！';
    summary.classList.add('seat-perfect');
  } else {
    summary.textContent = `必要あと：${Math.abs(seatDiff)}席`;
    summary.classList.add('seat-danger');
  }
}

function addPerson() {
  const input = document.getElementById('nameInput');
  const name = input.value.trim();

  if (name === '') return;

  const newPerson = createPersonElement({
    familyName: name,
    part: ''
  });

  document.getElementById('people-area').appendChild(newPerson);
  input.value = '';
  updateCounts();
}

function deletePerson() {
  const input = document.getElementById('deleteInput');
  const name = input.value.trim();

  if (name === '') return;

  document.querySelectorAll('.person').forEach(person => {
    if (person.textContent.trim() === name) {
      person.remove();
    }
  });

  updateCounts();
  input.value = '';
}

function addCar() {
  const carNameInput = document.getElementById('carNameInput');
  const capacityInput = document.getElementById('capacityInput');

  const carName = carNameInput.value.trim();
  const capacity = capacityInput.value;

  if (carName === '' || capacity === '') return;

  const newCar = createCarElement({
    familyName: carName,
    capacity: capacity,
    availability: ''
  });

  document.getElementById('inactive-cars').appendChild(newCar);
  applySavedCollapsedState(newCar);
  applyActiveOnlyView();

  carNameInput.value = '';
  capacityInput.value = '';

  updateCounts();
}

function deleteCar() {
  const input = document.getElementById('deleteCarInput');
  const carName = input.value.trim();

  if (carName === '') return;

  document.querySelectorAll('.car:not(.disabled-car)').forEach(car => {
    if (!getCarName(car).includes(carName)) return;

    const peopleInCar = car.querySelectorAll('.person');
    const peopleArea = document.getElementById('people-area');

    peopleInCar.forEach(person => {
      peopleArea.appendChild(person);
    });

    car.remove();
  });

  input.value = '';
  updateCounts();
}

function openAllCars() {
  document.querySelectorAll('.car').forEach(car => {
    setCarCollapsed(car, false);
  });
}

function closeAllCars() {
  document.querySelectorAll('.car').forEach(car => {
    setCarCollapsed(car, true);
  });
}

function applyActiveOnlyView() {
  const carSections = document.querySelector('.car-sections');
  const button = document.getElementById('active-only-button');

  if (carSections) {
    carSections.classList.toggle('active-only', isActiveOnlyView);
  }

  if (button) {
    button.textContent = isActiveOnlyView ? '🚙 全車表示' : '🚗 使用車だけ表示';
  }
}

function toggleActiveOnlyView() {
  isActiveOnlyView = !isActiveOnlyView;
  localStorage.setItem('dispatchActiveOnlyView', isActiveOnlyView ? 'true' : 'false');
  applyActiveOnlyView();
}

function resetChildPlacement() {
  const peopleArea = document.getElementById('people-area');

  document.querySelectorAll('.car .person').forEach(person => {
    person.classList.remove('selected');
    peopleArea.appendChild(person);
  });

  selectedPerson = null;
  draggedItem = null;

  const selectedName = document.getElementById('selected-name');
  if (selectedName) {
    selectedName.textContent = '選択中：なし';
  }

  updateCounts();
}


function escapeHtml(value) {
  return String(value)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function formatDateWithoutTimezone(value) {
  if (!value) return '';

  const rawText = String(value).trim();

  // yyyy/MM/dd や yyyy-MM-dd が含まれていれば、タイムゾーン文字列を落として日付だけ使う
  const dateMatch = rawText.match(/(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (dateMatch) {
    return `${Number(dateMatch[1])}/${Number(dateMatch[2])}/${Number(dateMatch[3])}`;
  }

  const parsedDate = new Date(rawText);
  if (!Number.isNaN(parsedDate.getTime())) {
    return `${parsedDate.getFullYear()}/${parsedDate.getMonth() + 1}/${parsedDate.getDate()}`;
  }

  // 念のため、日本標準時や GMT 以降などの表示だけ削る
  return rawText
    .replace(/\s*\([^)]*標準時[^)]*\)/g, '')
    .replace(/\s*GMT[+-]\d{4}.*$/g, '')
    .replace(/\s*UTC[+-]\d{1,2}(:?\d{2})?.*$/g, '')
    .trim();
}

function getSelectedEventDateText() {
  const option = document.getElementById('event-select').selectedOptions[0];
  return formatDateWithoutTimezone(option?.dataset?.date || '');
}

function getPartClassByName(name) {
  const child = (latestChildren || []).find(child =>
    child.familyName === name
  );

  return getPartClass(child?.part || '');
}

function getMembersFromCurrentScreen() {
  const cars = [];

  document.querySelectorAll('.car:not(.disabled-car)').forEach(car => {
    const carName = getCarName(car);
    const members = [];

    car.querySelectorAll('.person').forEach(person => {
      const name = person.textContent.trim();
      if (!name) return;

      const partClass = ['brass', 'woodwind', 'other'].find(className =>
        person.classList.contains(className)
      ) || getPartClassByName(name);

      members.push({
        name,
        partClass
      });
    });

    if (members.length === 0) return;

    cars.push({
      carName,
      members
    });
  });

  return cars;
}

function getMembersFromSavedData(eventName, routeName) {
  return (latestSavedData || [])
    .filter(item =>
      item.event === eventName &&
      item.route === routeName &&
      (item.members || []).length > 0
    )
    .map(item => ({
      carName: item.carName,
      members: (item.members || []).map(name => ({
        name,
        partClass: getPartClassByName(name)
      }))
    }));
}

function mergeCarsByName(cars) {
  const map = new Map();

  (cars || []).forEach(car => {
    if (!car.carName) return;

    if (!map.has(car.carName)) {
      map.set(car.carName, {
        carName: car.carName,
        members: []
      });
    }

    map.get(car.carName).members.push(...(car.members || []));
  });

  return [...map.values()];
}

function getRouteCarsForContact(routeName) {
  const eventName = getSelectedEvent();

  if (routeName === getSelectedRoute()) {
    return mergeCarsByName(getMembersFromCurrentScreen());
  }

  return mergeCarsByName(getMembersFromSavedData(eventName, routeName));
}

function getContactData() {
  const eventName = getSelectedEvent();
  const routeName = getSelectedRoute();
  const eventDate = getSelectedEventDateText();
  const cars = getMembersFromCurrentScreen();

  return {
    eventName,
    routeName,
    eventDate,
    cars
  };
}

function getContactPairData() {
  const eventName = getSelectedEvent();
  const eventDate = getSelectedEventDateText();
  const goCars = getRouteCarsForContact('行き');
  const backCars = getRouteCarsForContact('帰り');
  const carNames = [...new Set([
    ...goCars.map(car => car.carName),
    ...backCars.map(car => car.carName)
  ])];

  const goMap = new Map(goCars.map(car => [car.carName, car.members]));
  const backMap = new Map(backCars.map(car => [car.carName, car.members]));

  const cars = sortContactCarsByName(
    carNames.map(carName => ({
      carName,
      goMembers: goMap.get(carName) || [],
      backMembers: backMap.get(carName) || []
    }))
  );

  return {
    eventName,
    eventDate,
    cars
  };
}

function getContactCarDisplayName(carName) {
  const name = String(carName || '').trim();
  if (!name) return '';
  return name.endsWith('車') ? name : `${name}車`;
}

function sortContactCarsByName(cars) {
  return [...(cars || [])].sort((a, b) =>
    getContactCarDisplayName(a.carName).localeCompare(
      getContactCarDisplayName(b.carName),
      'ja',
      { numeric: true, sensitivity: 'base' }
    )
  );
}

function buildContactMembersHtml(members) {
  if (!members || members.length === 0) {
    return '<div class="contact-route-empty">—</div>';
  }

  return members.map(member =>
    `<div class="contact-member ${escapeHtml(member.partClass)}">${escapeHtml(member.name)}</div>`
  ).join('');
}

function normalizeMemberNameForCompare(name) {
  return String(name || '').trim();
}

function haveExactlySameMembers(goMembers, backMembers) {
  if (!goMembers || !backMembers) return false;
  if (goMembers.length === 0 || backMembers.length === 0) return false;
  if (goMembers.length !== backMembers.length) return false;

  const goNames = goMembers
    .map(member => normalizeMemberNameForCompare(member.name))
    .sort((a, b) => a.localeCompare(b, 'ja', { numeric: true, sensitivity: 'base' }));

  const backNames = backMembers
    .map(member => normalizeMemberNameForCompare(member.name))
    .sort((a, b) => a.localeCompare(b, 'ja', { numeric: true, sensitivity: 'base' }));

  return goNames.every((name, index) => name === backNames[index]);
}

function showContactLayout() {
  const layout = document.getElementById('contact-layout');
  const data = getContactPairData();

  if (!layout) return;

  if (data.cars.length === 0) {
    layout.innerHTML = '<p class="contact-empty">連絡用に表示できる配車がありません。</p>';
    layout.classList.remove('hidden');
    return;
  }

  let html = '<div class="contact-header">';

  if (data.eventName) {
    html += `<div class="contact-header-item contact-header-event">📋 ${escapeHtml(data.eventName)}</div>`;
  }

  html += '</div>';
  html += '<div class="contact-scroll-area">';
  html += '<div class="contact-cards">';

  data.cars.forEach(car => {
    html += '<div class="contact-car">';
    html += '<div class="contact-car-icon">🚗</div>';
    html += `<div class="contact-car-title">${escapeHtml(getContactCarDisplayName(car.carName))}</div>`;
    html += '<div class="contact-route-pair">';

    if (haveExactlySameMembers(car.goMembers, car.backMembers)) {
      html += '<div class="contact-route-matched">';
      html += '<div class="contact-route-labels-inline">';
      html += '<span class="contact-route-label go">行き</span>';
      html += '<span class="contact-route-label back">帰り</span>';
      html += '</div>';
      html += '<div class="contact-members">';
      html += buildContactMembersHtml(car.goMembers);
      html += '</div>';
      html += '</div>';
    } else {
      html += '<div class="contact-route-row">';
      html += '<span class="contact-route-label go">行き</span>';
      html += '<div class="contact-members">';
      html += buildContactMembersHtml(car.goMembers);
      html += '</div>';
      html += '</div>';

      html += '<div class="contact-route-row">';
      html += '<span class="contact-route-label back">帰り</span>';
      html += '<div class="contact-members">';
      html += buildContactMembersHtml(car.backMembers);
      html += '</div>';
      html += '</div>';
    }

    html += '</div>';
    html += '</div>';
  });

  html += '</div>';
  html += '</div>';
  html += '<p class="contact-note">スクショ・共有用：ヘッダー固定／車カードだけスクロール</p>';

  layout.innerHTML = html;
  layout.classList.remove('hidden');
  layout.scrollIntoView({ behavior: 'smooth', block: 'start' });
}


function hideContactLayout() {
  const layout = document.getElementById('contact-layout');
  if (!layout) return;
  layout.classList.add('hidden');
}

function formatContactMemberNames(members) {
  if (!members || members.length === 0) return '—';
  return members.map(member => member.name).join('、');
}

function buildContactText() {
  const data = getContactPairData();
  let text = `【${data.eventName || ''}・行き帰り】\n\n`;

  data.cars.forEach(car => {
    text += `${getContactCarDisplayName(car.carName)}\n`;

    if (haveExactlySameMembers(car.goMembers, car.backMembers)) {
      text += `行き／帰り：${formatContactMemberNames(car.goMembers)}\n\n`;
    } else {
      text += `行き：${formatContactMemberNames(car.goMembers)}\n`;
      text += `帰り：${formatContactMemberNames(car.backMembers)}\n\n`;
    }
  });

  return text.trim();
}

function copyContactText() {
  const data = getContactPairData();

  if (data.cars.length === 0) {
    alert('コピーできる配車がありません。');
    return;
  }

  const text = buildContactText();

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => {
        alert('連絡用テキストをコピーしました！');
      })
      .catch(() => {
        fallbackCopyContactText(text);
      });
  } else {
    fallbackCopyContactText(text);
  }
}

function fallbackCopyContactText(text) {
  const textarea = document.createElement('textarea');
  textarea.value = text;
  textarea.style.position = 'fixed';
  textarea.style.left = '-9999px';
  document.body.appendChild(textarea);
  textarea.focus();
  textarea.select();

  try {
    document.execCommand('copy');
    alert('連絡用テキストをコピーしました！');
  } catch (error) {
    alert('コピーに失敗しました。連絡用表示から手動でコピーしてください。');
  }

  textarea.remove();
}

async function saveToSheet() {
  const cars = [];

  document.querySelectorAll('.car:not(.disabled-car)').forEach(car => {
    const name = getCarName(car);
    const capacity = car.dataset.capacity;
    const remaining = car.querySelector('.count').textContent;
    const members = [];

    car.querySelectorAll('.person').forEach(person => {
      members.push(person.textContent.trim());
    });

    if (members.length === 0) return;

    cars.push({
      name,
      capacity,
      remaining,
      members
    });
  });

  const selectedEvent = getSelectedEvent();
  const selectedRoute = getSelectedRoute();

  if (cars.length === 0) {
    alert('配置された子どもがいないため、保存しませんでした');
    return;
  }

  console.log('保存データ', cars);
  console.log('予定', selectedEvent);
  console.log('区分', selectedRoute);

  await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      event: selectedEvent,
      route: selectedRoute,
      cars: cars
    })
  });

  alert('スプレッドシートに保存しました！');
}

async function confirmDispatch() {
  const cars = [];

  document.querySelectorAll('.car:not(.disabled-car)').forEach(car => {
    const name = getCarName(car);
    const members = [];

    car.querySelectorAll('.person').forEach(person => {
      const text = person.textContent.trim();
      if (text) members.push(text);
    });

    if (members.length === 0) return;

    cars.push({
      name,
      count: members.length,
      members
    });
  });

  const selectedEvent = getSelectedEvent();
  const selectedRoute = getSelectedRoute();
  const selectedDate = document.getElementById('event-select').selectedOptions[0].dataset.date;
  const dateObj = new Date(selectedDate);

  dateObj.setHours(dateObj.getHours() + 9);

  const formattedDate =
    dateObj.getFullYear() + '/' +
    String(dateObj.getMonth() + 1).padStart(2, '0') + '/' +
    String(dateObj.getDate()).padStart(2, '0');

  console.log('confirm cars', cars);

  await fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({
      action: 'confirmDispatch',
      date: formattedDate,
      event: selectedEvent,
      route: selectedRoute,
      cars: cars
    })
  });

  alert('配車を確定して、車出し予定に保存しました！');

  setTimeout(() => {
    loadEvents();
  }, 500);
}
</script>
